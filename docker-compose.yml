services:
  gateway:
    build: ./Gateway
    environment:
      KEYCLOAK_URL: ${KEYCLOAK_URL}
      REALM: ${REALM}
    ports:
      - "8081:8080"
    depends_on:
      - keycloak
      - auth-service
      - rabbitmq
    restart: unless-stopped

  postgres_keycloak:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - kc_data:/var/lib/postgresql/data
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: ${KC_DB}
      KC_DB_URL_HOST: ${KC_DB_URL_HOST}
      KC_DB_URL_DATABASE: ${KC_DB_URL_DATABASE}
      KC_DB_USERNAME: ${KC_DB_USERNAME}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD}
    command: start-dev
    ports:
      - "8080:8080"
    depends_on:
      - postgres_keycloak
    restart: unless-stopped

  auth-service:
    build: ./AuthService
    environment:
      KEYCLOAK_URL: ${KEYCLOAK_URL}
      REALM: ${REALM}
      CLIENT_ID: ${CLIENT_ID}
      CLIENT_SECRET: ${CLIENT_SECRET}
    ports:
      - "8082:8080"
      - "9092:9090"
    depends_on:
      - keycloak
    restart: unless-stopped

  notification-service:
    build: ./NotificationService
    environment:
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_VIRTUAL_HOST}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
      KEYCLOAK_CERTS: ${KEYCLOAK_CERTS}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE}
      REALM: ${REALM}
      MONGO_HOST: ${MONGO_HOST}
      MONGO_PORT: 27017
      MONGO_USERNAME: ${MONGO_USERNAME}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_DATABASE: ${MONGO_DATABASE}
    ports:
      - "8083:8080"
      - "9093:9090"
    depends_on:
      - rabbitmq
    restart: unless-stopped

  search-service:
    build: ./SearchService
    environment:
      ELASTICSEARCH_HOST: ${ELASTICSEARCH_HOST}
      ELASTICSEARCH_USERNAME: ${ELASTICSEARCH_USERNAME}
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD}
      QDRANT_HOST: ${QDRANT_HOST}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
      KEYCLOAK_CERTS: ${KEYCLOAK_CERTS}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE}
      REALM: ${REALM}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "8084:8080"
      - "9094:9090"
    depends_on:
      - auth-service
      - index-service
      - elasticsearch
      - qdrant
      - redis
    restart: unless-stopped

  ai-gateway:
    build: ./AIGateway
    environment:
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_VIRTUAL_HOST}
      TEMPORAL_HOST: http://temporal:7233
    ports:
      - "8085:8080"
    depends_on:
      - rabbitmq
      - ai-service
      - temporal
    restart: unless-stopped

  ai-service:
    build: ./AIService
    ports:
      - "8086:8080"
      - "9090:9090"
    depends_on:
      - temporal
      - rabbitmq
    restart: unless-stopped
    environment:
      YANDEX_CLOUD_FOLDER: ${YANDEX_CLOUD_FOLDER}
      YANDEX_CLOUD_API_KEY: ${YANDEX_CLOUD_API_KEY}
      YANDEX_CLOUD_MODEL: ${YANDEX_CLOUD_MODEL}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_VIRTUAL_HOST}
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: master
      KEYCLOAK_AUDIENCE: account

  postgres_content:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_CONTENT_DB}
      POSTGRES_USER: ${POSTGRES_CONTENT_USER}
      POSTGRES_PASSWORD: ${POSTGRES_CONTENT_PASSWORD}
    volumes:
      - content_data:/var/lib/postgresql/data
    restart: unless-stopped

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_BUCKET=${S3_BUCKET}
    ports:
      - "8333:8333"
      - "23646:23646"
    command: "mini -dir=/data"
    volumes:
      - seaweedfs-data:/data
    restart: unless-stopped

  content-service:
    build: ./ContentService
    environment:
      TEMPORAL_HOST: http://temporal:7233
      POSTGRES_CONTENT_DB: ${POSTGRES_CONTENT_DB}
      POSTGRES_CONTENT_USER: ${POSTGRES_CONTENT_USER}
      POSTGRES_CONTENT_PASSWORD: ${POSTGRES_CONTENT_PASSWORD}

      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ENDPOINT: ${S3_ENDPOINT}

      KEYCLOAK_URL: ${KEYCLOAK_URL}
      REALM: ${REALM}
      CLIENT_ID: ${CLIENT_ID}
      CLIENT_SECRET: ${CLIENT_SECRET}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE}
      KEYCLOAK_CERTS: ${KEYCLOAK_CERTS}
    ports:
      - "8087:8080"
    depends_on:
      - temporal
      - seaweedfs
      - index-service
      - ocr-service
      - postgres_content
    restart: unless-stopped

  index-service:
    build: ./IndexService
    environment:
      ELASTICSEARCH_HOST: ${ELASTICSEARCH_HOST}
      ELASTICSEARCH_USERNAME: ${ELASTICSEARCH_USERNAME}
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD}
      QDRANT_HOST: ${QDRANT_HOST}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
      KEYCLOAK_CERTS: ${KEYCLOAK_CERTS}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE}
      REALM: ${REALM}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION}
    ports:
      - "8088:8080"
      - "9098:9090"
    depends_on:
      - qdrant
      - elasticsearch
      - temporal
      - embedding-service
    restart: unless-stopped

  postgres_ocr:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_OCR_DB}
      POSTGRES_USER: ${POSTGRES_OCR_USER}
      POSTGRES_PASSWORD: ${POSTGRES_OCR_PASSWORD}
    volumes:
      - ocr_data:/var/lib/postgresql/data
    restart: unless-stopped

  ocr-service:
    build: ./OCRService
    environment:
      POSTGRES_HOST: postgres_ocr
      POSTGRES_DB: ${POSTGRES_OCR_DB}
      POSTGRES_USER: ${POSTGRES_OCR_USER}
      POSTGRES_PASSWORD: ${POSTGRES_OCR_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE}
    ports:
      - "8089:8080"
    depends_on:
      - postgres_ocr
      - temporal
      - seaweedfs
      - auth-service
    restart: unless-stopped

  embedding-service:
    build: ./EmbeddingService
    ports:
      - "8090:8080"
    volumes:
      - model_cache:/app/models

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:8.6.3-alpine
    ports:
      - "6379:6379"
    env_file:
      - .env
    command: >
      redis-server 
      --requirepass "${REDIS_PASSWORD}"
      --appendonly yes
    volumes:
      - redis_data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.1
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - ELASTIC_PASSWORD=${ELASTICSEARCH_PASSWORD}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - xpack.security.authc.api_key.enabled=true
      - xpack.security.authc.token.enabled=true
      - xpack.security.authc.anonymous.roles=kibana_system
      - xpack.security.authc.anonymous.authz_exception=false
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:9.4.1
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_SSL_VERIFICATIONMODE=none
      - ELASTICSEARCH_SSL_ENABLED=false
    depends_on:
      - elasticsearch

  postgres_temporal:
    environment:
      POSTGRES_USER: ${POSTGRES_TEMPORAL_USER}
      POSTGRES_PASSWORD: ${POSTGRES_TEMPORAL_PASSWORD}
    image: postgres:15
    ports:
      - "5454:5432"
    volumes:
      - temporal_data:/var/lib/postgresql/data

  temporal:
    depends_on:
      - postgres_temporal
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_TEMPORAL_USER}
      - POSTGRES_PWD=${POSTGRES_TEMPORAL_PASSWORD}
      - POSTGRES_SEEDS=postgres_temporal
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE_DEFAULT=default
      - TEMPORAL_DEFAULT_NAMESPACE=default
    image: temporalio/auto-setup:1.29.0
    ports:
      - "7233:7233"
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig

  temporal-ui:
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    image: temporalio/ui:2.41.0
    ports:
      - "8888:8080"

  mongo:
    image: mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  kc_data:
  temporal_data:
  esdata:
  content_data:
  seaweedfs-data:
  ocr_data:
  redis_data:
  qdrant_data:
  model_cache:
  mongo_data: