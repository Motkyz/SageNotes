syntax = "proto3";

package notes;

import "google/protobuf/timestamp.proto";

service NoteService {
  rpc GetNote(GetNoteRequest) returns (GetNoteResponse);

  rpc GetUserNotes(GetUserNotesRequest)
      returns (GetUserNotesResponse);

  rpc CreateNote(CreateNoteRequest)
      returns (CreateNoteResponse);

  rpc UpdateNote(UpdateNoteRequest)
      returns (UpdateNoteResponse);

  rpc DeleteNote(DeleteNoteRequest)
      returns (DeleteNoteResponse);
}

message Tag {
  string id = 1;
  string title = 2;
  string color = 3;
  string user_id = 4;
}

message File {
  string id = 1;

  string name = 2;
  string url = 3;

  string extension = 4;
  string mime_type = 5;

  int64 size = 6;

  google.protobuf.Timestamp created_at = 7;
}

message Note {
  string id = 1;

  string title = 2;
  string content = 3;

  repeated Tag tags = 4;
  repeated File files = 5;

  string user_id = 6;

  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message GetNoteRequest {
  string user_id = 1;
  string note_id = 2;
}

message GetNoteResponse {
  Note note = 1;
}

message GetUserNotesRequest {
  string user_id = 1;
}

message GetUserNotesResponse {
  repeated Note notes = 1;
}

message CreateNoteRequest {
  string user_id = 1;

  string title = 2;
  string content = 3;

  repeated string tags = 4;
}

message CreateNoteResponse {
  string note_id = 1;
}

message UpdateNoteRequest {
  string user_id = 1;
  string note_id = 2;

  optional string title = 3;
  optional string content = 4;

  repeated string tags = 5;
}

message UpdateNoteResponse {
  string note_id = 1;
}

message DeleteNoteRequest {
  string user_id = 1;
  string note_id = 2;
}

message DeleteNoteResponse {
  bool success = 1;
}