syntax = "proto3";
package ru.sagenotes.search;

option java_package = "ru.sagenotes.searchservice.grpc";
option java_multiple_files = true;

service SearchService {
  rpc Search(SearchRequest) returns (SearchResponse);
}

enum SearchSource {
  ELASTICSEARCH = 0;
  QDRANT = 1;
  HYBRID = 2;
}

message SearchRequest {
  string query = 1;
  optional int32 limit = 2;
}

message SearchResponse {
  repeated SearchResult results = 1;
}

message SearchResult {
  string note_id = 1;
  string text = 2;
  double score = 3;
  SearchSource source = 4;
}